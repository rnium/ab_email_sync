services:

  # ---------------------------------------------------------------------------
  # Actual Budget API bridge – must be running before the backend starts.
  # Port 3000 is intentionally NOT published; only the backend accesses it
  # over the internal Docker network.
  # ---------------------------------------------------------------------------
  api_server:
    image: rnium/mailsync-api
    build:
      context: ./api_server
    pull_policy: missing
    restart: unless-stopped
    env_file:
      - path: ./api_server/.env
        required: false
    environment:
      NODE_ENV: production
      ACTUAL_DATA_DIR: /data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Django admin / web interface.
  # Runs migrate + seed_configurations on every start (both are idempotent).
  # This is the only service with a published port.
  # ---------------------------------------------------------------------------
  backend:
    image: rnium/mailsync-backend
    build:
      context: ./backend
    pull_policy: missing
    restart: unless-stopped
    env_file:
      - path: ./backend/.env
        required: true
    environment:
      ACTUAL_API_SERVER_URL: http://api_server:3000
      DB_DIR: /data
      # Heartbeat file written by the scheduler, read here by the admin UI
      SCHEDULER_HEARTBEAT_FILE: /shared/scheduler_heartbeat
    volumes:
      - ./backend/db.sqlite3:/data/db.sqlite3
      - ./backend/static:/app/static
      - scheduler_state:/shared
    ports:
      - "8000:8000"
    depends_on:
      api_server:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Scheduler – same image as backend, runs the fetch-sync loop.
  # Reads daytime/nighttime intervals from the database on every tick so
  # changes made through the admin UI take effect without a restart.
  # ---------------------------------------------------------------------------
  scheduler:
    image: rnium/mailsync-backend
    build:
      context: ./backend
    pull_policy: missing
    restart: unless-stopped
    env_file:
      - path: ./backend/.env
        required: true
    environment:
      ACTUAL_API_SERVER_URL: http://api_server:3000
      DB_DIR: /data
      SCHEDULER_HEARTBEAT_FILE: /shared/scheduler_heartbeat
    volumes:
      - ./backend/db.sqlite3:/data/db.sqlite3
      - scheduler_state:/shared
    depends_on:
      api_server:
        condition: service_healthy
      backend:
        condition: service_started
    command: ["python", "manage.py", "run_scheduler"]
    healthcheck:
      test: ["CMD", "sh", "-c", "test $(($(date +%s) - $(date +%s -r /shared/scheduler_heartbeat))) -lt 1200"]
      interval: 5m
      timeout: 10s
      retries: 2
      start_period: 2m

volumes:
  scheduler_state:

